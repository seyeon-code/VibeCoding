name: Deploy All to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - 'lecture1/my-community/**'
      - 'lecture1/my-portfolio/**'
      - '.github/workflows/deploy-all.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build my-community
        run: |
          npm install
          npm run build
        working-directory: lecture1/my-community
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Install & Build my-portfolio
        run: |
          npm install
          npm run build
        working-directory: lecture1/my-portfolio
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Combine builds
        run: |
          mkdir -p lecture1/my-community/dist/portfolio
          cp -r lecture1/my-portfolio/dist/. lecture1/my-community/dist/portfolio/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: lecture1/my-community/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
