name: Deploy mini_sns (Re:born) to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - 'mini_sns/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mini_sns/package-lock.json

      - name: Install dependencies
        working-directory: mini_sns
        run: npm install

      - name: Build
        working-directory: mini_sns
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_UNSPLASH_ACCESS_KEY: ${{ secrets.VITE_UNSPLASH_ACCESS_KEY }}

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: mini_sns/dist
          target-folder: mini_sns
          branch: gh-pages
          clean: false
